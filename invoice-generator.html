<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профессиональный Генератор Счетов</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="invoice-card">
    <div class="header-flex">
        <div style="width: 45%;">
            <label>Продавец (ваши реквизиты)</label>
            <textarea id="seller-info" rows="4" placeholder="ООО 'Ромашка', ИНН 123456..."></textarea>
        </div>
        <div style="width: 45%;">
            <label>Покупатель</label>
            <textarea id="buyer-info" rows="4" placeholder="ИП Иванов, адрес..."></textarea>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Описание товара или услуги</th>
                <th width="80">Кол-во</th>
                <th width="120">Цена</th>
                <th width="120">Сумма</th>
                <th width="40"></th>
            </tr>
        </thead>
        <tbody id="items-tbody">
            </tbody>
    </table>

    <button class="btn-add" onclick="addRow()">+ Добавить строку</button>

    <div class="total-box">
        <span>ИТОГО К ОПЛАТЕ:</span>
        <div class="total-amount" id="grand-total">0.00 ₽</div>
    </div>

    <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; display: flex; justify-content: space-between;">
        <button class="btn-print" onclick="window.print()">Печать или сохранить в PDF</button>
        <p style="font-size: 12px; color: #94a3b8;">Данные сохраняются автоматически</p>
    </div>
</div>

<script>
    // 1. Автосохранение реквизитов
    const sellerField = document.getElementById('seller-info');
    sellerField.value = localStorage.getItem('invoice_seller') || '';
    sellerField.oninput = () => localStorage.setItem('invoice_seller', sellerField.value);

    // 2. Логика таблицы
    function addRow() {
        const tbody = document.getElementById('items-tbody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" placeholder="Услуга..." class="name"></td>
            <td><input type="number" value="1" class="qty" oninput="calc()"></td>
            <td><input type="number" value="0" class="price" oninput="calc()"></td>
            <td class="row-total">0.00 ₽</td>
            <td><button class="btn-delete" onclick="this.parentElement.parentElement.remove(); calc()">×</button></td>
        `;
        tbody.appendChild(tr);
        calc();
    }

    // 3. Расчет
    function calc() {
        let grandTotal = 0;
        const rows = document.querySelectorAll('#items-tbody tr');
        rows.forEach(row => {
            const qty = parseFloat(row.querySelector('.qty').value) || 0;
            const price = parseFloat(row.querySelector('.price').value) || 0;
            const total = qty * price;
            row.querySelector('.row-total').innerText = total.toLocaleString() + ' ₽';
            grandTotal += total;
        });
        document.getElementById('grand-total').innerText = grandTotal.toLocaleString() + ' ₽';
    }

    // Добавим первую строку сразу
    addRow();
</script>

</body>
</html>
