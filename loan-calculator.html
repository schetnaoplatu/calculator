<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кредитный калькулятор с графиком платежей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calc-container">
    <div class="panel">
        <h2>Параметры кредита</h2>
        <div class="input-group">
            <label>Сумма кредита (₽)</label>
            <input type="number" id="amount" value="500000" oninput="calculateLoan()">
        </div>
        <div class="input-group">
            <label>Срок (месяцев)</label>
            <input type="number" id="months" value="12" oninput="calculateLoan()">
        </div>
        <div class="input-group">
            <label>Ставка (% годовых)</label>
            <input type="number" id="rate" value="15" step="0.1" oninput="calculateLoan()">
        </div>

        <div class="summary">
            <div class="summary-item">
                <span>Ежемесячный платеж:</span>
                <span id="monthlyPayment" style="color: var(--primary); font-size: 20px;">0 ₽</span>
            </div>
            <div class="summary-item" style="font-weight: normal; font-size: 14px;">
                <span>Переплата по процентам:</span>
                <span id="totalInterest">0 ₽</span>
            </div>
            <div class="summary-item" style="font-weight: normal; font-size: 14px;">
                <span>Общая сумма выплат:</span>
                <span id="totalPayment">0 ₽</span>
            </div>
        </div>
        <a href="index.html" class="back-link">← Вернуться на главную</a>
    </div>

    <div class="schedule-container">
        <h3 style="margin-top:0">График платежей</h3>
        <table>
            <thead>
                <tr>
                    <th>№</th>
                    <th>Платеж</th>
                    <th>Проценты</th>
                    <th>Долг</th>
                    <th>Остаток</th>
                </tr>
            </thead>
            <tbody id="scheduleBody">
                </tbody>
        </table>
    </div>
</div>

<script>
function calculateLoan() {
    const amount = parseFloat(document.getElementById('amount').value) || 0;
    const months = parseInt(document.getElementById('months').value) || 0;
    const annualRate = parseFloat(document.getElementById('rate').value) || 0;
    
    if (amount <= 0 || months <= 0 || annualRate <= 0) return;

    const monthlyRate = annualRate / 100 / 12;
    const x = Math.pow(1 + monthlyRate, months);
    const monthlyPayment = (amount * x * monthlyRate) / (x - 1);
    
    document.getElementById('monthlyPayment').innerText = monthlyPayment.toLocaleString(undefined, {maximumFractionDigits: 0}) + ' ₽';
    document.getElementById('totalPayment').innerText = (monthlyPayment * months).toLocaleString(undefined, {maximumFractionDigits: 0}) + ' ₽';
    document.getElementById('totalInterest').innerText = ((monthlyPayment * months) - amount).toLocaleString(undefined, {maximumFractionDigits: 0}) + ' ₽';

    // Генерация графика
    let balance = amount;
    let html = '';
    for (let i = 1; i <= months; i++) {
        let interestMonth = balance * monthlyRate;
        let principalMonth = monthlyPayment - interestMonth;
        balance -= principalMonth;
        
        if (i === months) balance = 0; // Корректировка последней строки

        html += `<tr>
            <td>${i}</td>
            <td>${monthlyPayment.toFixed(0)}</td>
            <td>${interestMonth.toFixed(0)}</td>
            <td>${principalMonth.toFixed(0)}</td>
            <td>${Math.max(0, balance).toFixed(0)}</td>
        </tr>`;
        
        if (i > 24 && months > 24) { // Ограничим вывод для очень длинных кредитов
            html += `<tr><td colspan="5" style="text-align:center">... и еще ${months - i} мес.</td></tr>`;
            break;
        }
    }
    document.getElementById('scheduleBody').innerHTML = html;
}

calculateLoan();
</script>

</body>
</html>
