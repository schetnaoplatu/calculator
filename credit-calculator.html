<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кредитный калькулятор онлайн — Расчет платежей</title>
    <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calc-card">
    <h2 style="text-align: center; margin-bottom: 25px;">Кредитный калькулятор</h2>
    
    <div class="input-group">
        <label>Сумма кредита (₽)</label>
        <input type="number" id="amount" value="1000000" oninput="calculateLoan()">
    </div>

    <div class="input-group">
        <label>Процентная ставка (%)</label>
        <input type="number" id="rate" value="15" step="0.1" oninput="calculateLoan()">
    </div>

    <div class="input-group">
        <label>Срок кредита (в месяцах)</label>
        <input type="number" id="months" value="12" oninput="calculateLoan()">
    </div>

    <div class="result-grid">
        <div class="res-item" style="grid-column: span 2; background: #eff6ff;">
            <span class="res-label">Ежемесячный платеж</span>
            <span id="monthly-payment" class="res-val" style="font-size: 28px;">0 ₽</span>
        </div>
        <div class="res-item">
            <span class="res-label">Общая выплата</span>
            <span id="total-repayment" class="res-val">0 ₽</span>
        </div>
        <div class="res-item">
            <span class="res-label">Переплата по процентам</span>
            <span id="total-interest" class="res-val highlight">0 ₽</span>
        </div>
    </div>

    <div style="text-align: center; margin-top: 25px;">
        <a href="index.html" style="color: #94a3b8; text-decoration: none; font-size: 14px;">← Вернуться на главную</a>
    </div>
</div>

<script>
function calculateLoan() {
    const amount = parseFloat(document.getElementById('amount').value);
    const rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
    const months = parseFloat(document.getElementById('months').value);

    if (amount > 0 && rate > 0 && months > 0) {
        // Формула аннуитетного платежа: m = p * (r * (1 + r)^n) / ((1 + r)^n - 1)
        const x = Math.pow(1 + rate, months);
        const monthly = (amount * x * rate) / (x - 1);
        
        const total = monthly * months;
        const interest = total - amount;

        document.getElementById('monthly-payment').innerText = monthly.toLocaleString(undefined, {maximumFractionDigits: 0}) + ' ₽';
        document.getElementById('total-repayment').innerText = total.toLocaleString(undefined, {maximumFractionDigits: 0}) + ' ₽';
        document.getElementById('total-interest').innerText = interest.toLocaleString(undefined, {maximumFractionDigits: 0}) + ' ₽';
    } else {
        document.getElementById('monthly-payment').innerText = '0 ₽';
        document.getElementById('total-repayment').innerText = '0 ₽';
        document.getElementById('total-interest').innerText = '0 ₽';
    }
}

// Запуск при загрузке
calculateLoan();
</script>

</body>
</html>
