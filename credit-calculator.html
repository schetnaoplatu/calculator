<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Кредитный калькулятор онлайн</title>

<meta name="description" content="Рассчитать кредит онлайн. Калькулятор кредита с ежемесячным платежом и процентами. Бесплатный онлайн расчет.">

<link rel="stylesheet" href="style.css">

<style>

.container{
max-width:600px;
margin:auto;
padding:40px;
background:white;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#3b82f6;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>Кредитный калькулятор</h1>

<p>Введите сумму кредита, процентную ставку и срок кредита.</p>

<label>Сумма кредита</label>
<input type="number" id="amount">

<label>Процентная ставка (%)</label>
<input type="number" id="rate">

<label>Срок кредита (месяцы)</label>
<input type="number" id="months">

<button onclick="calculateLoan()">Рассчитать</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateLoan(){

let amount = document.getElementById("amount").value;
let rate = document.getElementById("rate").value / 100 / 12;
let months = document.getElementById("months").value;

let payment = (amount * rate) / (1 - Math.pow(1 + rate, -months));

payment = payment.toFixed(2);

document.getElementById("result").innerHTML =
"Ежемесячный платеж: " + payment;

}

</script>

</body>
</html>
