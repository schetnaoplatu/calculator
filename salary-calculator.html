<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор зарплаты: расчет НДФЛ</title>
    <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="salary-card">
        <h2 style="text-align:center">Расчет зарплаты</h2>
        <div class="input-box">
            <label>Оклад (до вычета налогов), ₽</label>
            <input type="number" id="salary" value="50000" oninput="calcSalary()">
        </div>
        <div class="res-list">
            <div class="res-row">
                <span>НДФЛ (13%):</span>
                <span id="tax" class="val">0 ₽</span>
            </div>
            <div class="res-row" style="border:none; margin-top:10px">
                <span style="font-weight:bold">На руки:</span>
                <span id="hand" class="val total-hand">0 ₽</span>
            </div>
        </div>
        <p style="font-size:12px; color:#94a3b8; margin-top:15px">Работодатель также заплатит ~30% взносов: <span id="soc">0</span> ₽</p>
        <div style="text-align:center; margin-top:20px"><a href="index.html" style="color:#cbd5e1; text-decoration:none">← На главную</a></div>
    </div>
    <script>
        function calcSalary() {
            let s = parseFloat(document.getElementById('salary').value) || 0;
            let tax = s * 0.13;
            let hand = s - tax;
            let soc = s * 0.30;
            document.getElementById('tax').innerText = tax.toLocaleString() + ' ₽';
            document.getElementById('hand').innerText = hand.toLocaleString() + ' ₽';
            document.getElementById('soc').innerText = soc.toLocaleString();
        }
        calcSalary();
    </script>
</body>
</html>
