<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор QR-кодов онлайн — Бесплатно</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
   <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="qr-container">
    <h1 style="margin-bottom: 10px;">Генератор QR-кода</h1>
    <p style="color: #64748b; margin-bottom: 20px;">Введите ссылку или текст, чтобы мгновенно создать QR-код</p>

    <div class="input-group">
        <input type="text" id="qr-text" placeholder="https://example.com" oninput="generateQR()">
    </div>

    <div id="qrcode"></div>
    
    <br>
    <button id="download-btn" class="btn-download" onclick="downloadQR()">Скачать QR-код (PNG)</button>

    <a href="index.html" class="back-link">← Вернуться на главную</a>
</div>

<script>
    let qrcode = new QRCode(document.getElementById("qrcode"), {
        width: 256,
        height: 256,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
    });

    function generateQR() {
        let text = document.getElementById("qr-text").value;
        let downloadBtn = document.getElementById("download-btn");
        
        if (text.trim() !== "") {
            qrcode.clear();
            qrcode.makeCode(text);
            downloadBtn.style.display = "inline-block";
        } else {
            downloadBtn.style.display = "none";
        }
    }

    function downloadQR() {
        // Находим изображение внутри контейнера qrcode
        let img = document.querySelector("#qrcode img");
        if (img) {
            let link = document.createElement("a");
            link.href = img.src;
            link.download = "qr-code-schetnaoplatu.png";
            link.click();
        }
    }
</script>

</body>
</html>
