<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Изменение регистра текста онлайн</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="text-card">
        <h2>Редактор регистра</h2>
        <textarea id="txt"></textarea>
        <div class="btn-flex">
            <button onclick="change('up')">ВЕРХНИЙ РЕГИСТР</button>
            <button onclick="change('down')">нижний регистр</button>
            <button onclick="change('cap')">Как В Предложениях</button>
        </div>
        <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#cbd5e1; text-decoration:none">← На главную</a>
    </div>
    <script>
        function change(type) {
            let area = document.getElementById('txt');
            if (type === 'up') area.value = area.value.toUpperCase();
            if (type === 'down') area.value = area.value.toLowerCase();
            if (type === 'cap') {
                area.value = area.value.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            }
        }
    </script>
</body>
</html>
