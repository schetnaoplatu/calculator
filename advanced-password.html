<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продвинутый генератор паролей — Безопасность онлайн</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2 style="text-align:center; margin-top:0">Генератор паролей</h2>
    
    <div class="result-container" onclick="copyToClipboard()" title="Нажмите, чтобы скопировать">
        <div id="pass-display">Нажмите «Создать»</div>
        <div class="strength-bar"><div id="strength-fill"></div></div>
    </div>
    <div class="copy-hint">Нажмите на пароль, чтобы скопировать</div>

    <div style="margin: 20px 0;">
        <div class="option">
            <span>Длина: <b id="len-label">16</b></span>
        </div>
        <input type="range" id="length" min="6" max="50" value="16" oninput="updateLen()">
    </div>

    <div class="option"><label>Заглавные буквы (ABC)</label><input type="checkbox" id="upper" checked onchange="generate()"></div>
    <div class="option"><label>Строчные буквы (abc)</label><input type="checkbox" id="lower" checked onchange="generate()"></div>
    <div class="option"><label>Цифры (123)</label><input type="checkbox" id="nums" checked onchange="generate()"></div>
    <div class="option"><label>Символы (!@#)</label><input type="checkbox" id="symbols" checked onchange="generate()"></div>

    <button class="btn-gen" onclick="generate()">СГЕНЕРИРОВАТЬ ПАРОЛЬ</button>
    
    <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#cbd5e1; text-decoration:none; font-size:14px">← На главную</a>
</div>

<script>
    function updateLen() {
        document.getElementById('len-label').innerText = document.getElementById('length').value;
        generate();
    }

    function generate() {
        const length = document.getElementById('length').value;
        const hasUpper = document.getElementById('upper').checked;
        const hasLower = document.getElementById('lower').checked;
        const hasNums = document.getElementById('nums').checked;
        const hasSymbols = document.getElementById('symbols').checked;

        const upperArr = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lowerArr = "abcdefghijklmnopqrstuvwxyz";
        const numsArr = "0123456789";
        const symbolsArr = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        let charPool = "";
        if (hasUpper) charPool += upperArr;
        if (hasLower) charPool += lowerArr;
        if (hasNums) charPool += numsArr;
        if (hasSymbols) charPool += symbolsArr;

        if (charPool === "") {
            document.getElementById('pass-display').innerText = "Выберите опции";
            return;
        }

        let password = "";
        for (let i = 0; i < length; i++) {
            password += charPool.charAt(Math.floor(Math.random() * charPool.length));
        }

        document.getElementById('pass-display').innerText = password;
        updateStrength(password);
    }

    function updateStrength(pass) {
        const fill = document.getElementById('strength-fill');
        let score = 0;
        if (pass.length > 8) score += 25;
        if (pass.length > 12) score += 25;
        if (/[0-9]/.test(pass) && /[a-z]/.test(pass) && /[A-Z]/.test(pass)) score += 25;
        if (/[^A-Za-z0-9]/.test(pass)) score += 25;

        fill.style.width = score + "%";
        if (score <= 25) fill.style.background = "#ef4444";
        else if (score <= 50) fill.style.background = "#f59e0b";
        else if (score <= 75) fill.style.background = "#3b82f6";
        else fill.style.background = "#10b981";
    }

    function copyToClipboard() {
        const text = document.getElementById('pass-display').innerText;
        if (text === "Нажмите «Создать»" || text === "Выберите опции") return;
        navigator.clipboard.writeText(text).then(() => {
            alert("Пароль скопирован!");
        });
    }

    // Генерируем сразу при загрузке
    generate();
</script>

</body>
</html>
