<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор резюме — Создать бесплатно</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Helvetica', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        .container { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        
        /* Стили формы (слева) */
        .editor { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .editor h3 { color: var(--accent); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        /* Стили резюме (справа) */
        .preview { background: white; padding: 40px; min-height: 1000px; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: sticky; top: 20px; }
        .cv-header { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 20px; margin-bottom: 20px; }
        .cv-name { font-size: 28px; font-weight: bold; color: var(--primary); text-transform: uppercase; margin: 0; }
        .cv-title { font-size: 18px; color: var(--accent); margin-top: 5px; }
        
        .cv-section { margin-bottom: 20px; }
        .cv-section-title { font-weight: bold; text-transform: uppercase; color: var(--primary); border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .cv-text { white-space: pre-line; font-size: 14px; line-height: 1.6; color: #333; }

        .btn-print { background: #10b981; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }

        @media print {
            .editor, .btn-print, .back-link { display: none !important; }
            .container { display: block; }
            .preview { box-shadow: none; padding: 0; position: static; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="editor">
        <h3>Личные данные</h3>
        <input type="text" id="inName" placeholder="ФИО" oninput="updateCV()">
        <input type="text" id="inJob" placeholder="Желаемая должность" oninput="updateCV()">
        <input type="text" id="inContact" placeholder="Телефон, Email, Город" oninput="updateCV()">
        
        <h3>О себе</h3>
        <textarea id="inAbout" rows="4" placeholder="Кратко о ваших достижениях..." oninput="updateCV()"></textarea>
        
        <h3>Опыт работы</h3>
        <textarea id="inExp" rows="6" placeholder="Период — Компания — Обязанности" oninput="updateCV()"></textarea>
        
        <h3>Образование</h3>
        <textarea id="inEdu" rows="4" placeholder="ВУЗ, специальность, год" oninput="updateCV()"></textarea>

        <button class="btn-print" onclick="window.print()">Распечатать / Сохранить PDF</button>
        <a href="index.html" class="back-link" style="display:block; text-align:center; margin-top:20px; color:#aaa; text-decoration:none">← На главную</a>
    </div>

    <div class="preview" id="cv-print-area">
        <div class="cv-header">
            <div id="outName" class="cv-name">Иван Иванов</div>
            <div id="outJob" class="cv-title">Ваша должность</div>
            <div id="outContact" style="margin-top:10px; font-size:12px; color:#666;">+7 (999) 000-00-00 | email@example.com</div>
        </div>

        <div class="cv-section">
            <div class="cv-section-title">О себе</div>
            <div id="outAbout" class="cv-text">Расскажите о своих сильных сторонах...</div>
        </div>

        <div class="cv-section">
            <div class="cv-section-title">Опыт работы</div>
            <div id="outExp" class="cv-text">Здесь будет ваш список прошлых мест работы...</div>
        </div>

        <div class="cv-section">
            <div class="cv-section-title">Образование</div>
            <div id="outEdu" class="cv-text">Данные об учебных заведениях...</div>
        </div>
    </div>
</div>

<script>
    function updateCV() {
        const fields = [
            ['inName', 'outName'],
            ['inJob', 'outJob'],
            ['inContact', 'outContact'],
            ['inAbout', 'outAbout'],
            ['inExp', 'outExp'],
            ['inEdu', 'outEdu']
        ];
        
        fields.forEach(pair => {
            const val = document.getElementById(pair[0]).value;
            if(val) {
                document.getElementById(pair[1]).innerText = val;
            }
        });
    }
</script>

</body>
</html>
