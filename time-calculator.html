<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"><title>Калькулятор времени</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <h2>Сложить время</h2>
    <div>Тайм 1: <input type="number" id="h1" placeholder="ч"> : <input type="number" id="m1" placeholder="м"></div>
    <div>Тайм 2: <input type="number" id="h2" placeholder="ч"> : <input type="number" id="m2" placeholder="м"></div>
    <button onclick="calc()">РАССЧИТАТЬ СУММУ</button>
    <div id="res">00:00</div>
    <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#aaa; text-decoration:none;">← Назад</a>
</div>
<script>
    function calc() {
        let totalMin = (parseInt(document.getElementById('h1').value)||0)*60 + (parseInt(document.getElementById('m1').value)||0) +
                       (parseInt(document.getElementById('h2').value)||0)*60 + (parseInt(document.getElementById('m2').value)||0);
        let h = Math.floor(totalMin / 60);
        let m = totalMin % 60;
        document.getElementById('res').innerText = `${h}ч. ${m}мин.`;
    }
</script>
</body>
</html>
