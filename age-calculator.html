<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Узнать свой возраст — Калькулятор</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="age-card">
        <h2>Сколько вам лет?</h2>
        <p style="color:#64748b; margin-bottom:15px">Выберите дату рождения:</p>
        <input type="date" id="dob" onchange="calcAge()">
        
        <div id="results" class="age-result" style="display:none">
            <div class="age-box" style="grid-column: span 2;">
                <span id="years-res" class="age-val">0</span>
                <span style="font-size:14px; color:#15803d">полных лет</span>
            </div>
            <div class="age-box"><span id="months-res" class="age-val">0</span><span>месяцев</span></div>
            <div class="age-box"><span id="days-res" class="age-val">0</span><span>дней</span></div>
        </div>
        <a href="index.html" style="display:block; margin-top:20px; color:#cbd5e1; text-decoration:none">← На главную</a>
    </div>
    <script>
        function calcAge() {
            let birth = new Date(document.getElementById('dob').value);
            let now = new Date();
            if (birth > now) return;

            let years = now.getFullYear() - birth.getFullYear();
            let months = (now.getFullYear() - birth.getFullYear()) * 12 + (now.getMonth() - birth.getMonth());
            let diff = now - birth;
            let days = Math.floor(diff / (1000 * 60 * 60 * 24));

            document.getElementById('years-res').innerText = years;
            document.getElementById('months-res').innerText = months;
            document.getElementById('days-res').innerText = days;
            document.getElementById('results').style.display = 'grid';
        }
    </script>
</body>
</html>
