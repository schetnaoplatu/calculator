<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ипотечный калькулятор — Расчет ипотеки</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .m-card { max-width: 650px; margin: 30px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        label { font-size: 14px; color: #64748b; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .res-box { margin-top: 25px; background: #2563eb; color: white; padding: 20px; border-radius: 12px; text-align: center; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
    </style>
</head>
<body>
    <div class="m-card">
        <h2>Расчет ипотеки</h2>
        <div class="grid">
            <div>
                <label>Стоимость жилья (₽)</label>
                <input type="number" id="price" value="5000000" oninput="calcM()">
            </div>
            <div>
                <label>Первоначальный взнос (₽)</label>
                <input type="number" id="down" value="1000000" oninput="calcM()">
            </div>
            <div>
                <label>Срок (лет)</label>
                <input type="number" id="years" value="20" oninput="calcM()">
            </div>
            <div>
                <label>Ставка (%)</label>
                <input type="number" id="rate" value="12" step="0.1" oninput="calcM()">
            </div>
        </div>
        <div class="res-box">
            <span>Ежемесячный платеж</span>
            <div id="m-pay" style="font-size:32px; font-weight:bold">0 ₽</div>
            <div class="res-grid">
                <div><span>Переплата:</span><br><b id="m-over">0 ₽</b></div>
                <div><span>Общая сумма:</span><br><b id="m-total">0 ₽</b></div>
            </div>
        </div>
        <div style="text-align:center; margin-top:20px"><a href="index.html" style="color:#94a3b8; text-decoration:none">← На главную</a></div>
    </div>
    <script>
        function calcM() {
            let price = parseFloat(document.getElementById('price').value) || 0;
            let down = parseFloat(document.getElementById('down').value) || 0;
            let years = parseFloat(document.getElementById('years').value) || 0;
            let rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
            
            let loanAmount = price - down;
            let months = years * 12;
            
            if(loanAmount > 0 && rate > 0 && months > 0) {
                let x = Math.pow(1 + rate, months);
                let monthly = (loanAmount * x * rate) / (x - 1);
                let total = monthly * months;
                document.getElementById('m-pay').innerText = monthly.toLocaleString(undefined, {maximumFractionDigits:0}) + ' ₽';
                document.getElementById('m-over').innerText = (total - loanAmount).toLocaleString(undefined, {maximumFractionDigits:0}) + ' ₽';
                document.getElementById('m-total').innerText = total.toLocaleString(undefined, {maximumFractionDigits:0}) + ' ₽';
            }
        }
        calcM();
    </script>
</body>
</html>
