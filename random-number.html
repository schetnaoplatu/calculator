<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор случайных чисел — Для розыгрышей и конкурсов</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rnd-card">
    <h2 style="margin-top:0">Рандомайзер</h2>
    
    <div class="result-display" id="mainRes">?</div>

    <div class="settings-grid">
        <div>
            <label>От</label>
            <input type="number" id="min" value="1">
        </div>
        <div>
            <label>До</label>
            <input type="number" id="max" value="100">
        </div>
        <div style="grid-column: span 2;">
            <label>Сколько чисел выдать?</label>
            <input type="number" id="count" value="1">
        </div>
    </div>

    <button class="btn-main" onclick="roll()">СГЕНЕРИРОВАТЬ</button>

    <div id="historyBlock" class="list-results" style="display:none">
        <b>Результаты:</b> <span id="historyText"></span>
    </div>

    <a href="index.html" style="display:block; margin-top:25px; color:#cbd5e1; text-decoration:none; font-size:14px">← На главную</a>
</div>

<script>
    function roll() {
        const min = parseInt(document.getElementById('min').value);
        const max = parseInt(document.getElementById('max').value);
        const count = parseInt(document.getElementById('count').value);
        const display = document.getElementById('mainRes');
        const historyBlock = document.getElementById('historyBlock');
        const historyText = document.getElementById('historyText');

        if (isNaN(min) || isNaN(max) || min >= max) {
            alert("Проверьте диапазон!");
            return;
        }

        let results = [];
        
        // Если нужно одно число — делаем анимацию
        if (count === 1) {
            let iterations = 0;
            const interval = setInterval(() => {
                display.innerText = Math.floor(Math.random() * (max - min + 1)) + min;
                iterations++;
                if (iterations > 12) {
                    clearInterval(interval);
                    const final = Math.floor(Math.random() * (max - min + 1)) + min;
                    display.innerText = final;
                }
            }, 50);
            historyBlock.style.display = 'none';
        } else {
            // Если нужно много чисел
            for (let i = 0; i < count; i++) {
                results.push(Math.floor(Math.random() * (max - min + 1)) + min);
            }
            display.innerText = results[0]; // Показываем первое
            historyText.innerText = results.join(', ');
            historyBlock.style.display = 'block';
        }
    }
</script>

</body>
</html>
