<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Генератор надежных паролей</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .pass-card { max-width: 500px; margin: 40px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .pass-display { background: #f1f5f9; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 20px; word-break: break-all; margin-bottom: 20px; border: 1px solid #e2e8f0; min-height: 30px; text-align: center; }
        .setting { display: flex; justify-content: space-between; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="pass-card">
        <h3>Генератор паролей</h3>
        <div id="pass-out" class="pass-display">Нажмите создать</div>
        
        <div class="setting">
            <span>Длина: <b id="len-val">12</b></span>
            <input type="range" id="length" min="4" max="32" value="12" oninput="document.getElementById('len-val').innerText=this.value">
        </div>
        <div class="setting"><label>Цифры</label><input type="checkbox" id="num" checked></div>
        <div class="setting"><label>Спецсимволы</label><input type="checkbox" id="sym" checked></div>
        
        <button onclick="gen()">Создать пароль</button>
        <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#cbd5e1; text-decoration:none">← На главную</a>
    </div>
    <script>
        function gen() {
            let length = document.getElementById('length').value;
            let charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if (document.getElementById('num').checked) charset += "0123456789";
            if (document.getElementById('sym').checked) charset += "!@#$%^&*()_+~";
            
            let retVal = "";
            for (let i = 0; i < length; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            document.getElementById("pass-out").innerText = retVal;
        }
    </script>
</body>
</html>
