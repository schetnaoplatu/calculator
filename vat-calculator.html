<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор НДС онлайн</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .calc-card { max-width: 500px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; }
        .result-box { background: #f0f7ff; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .res-val { font-size: 24px; font-weight: bold; color: #2563eb; }
    </style>
</head>
<body>
    <div class="calc-card">
        <h2>Калькулятор НДС</h2>
        <input type="number" id="amount" placeholder="Введите сумму" oninput="calcVat()">
        <select id="type" onchange="calcVat()" style="width: 100%; padding: 10px; border-radius: 8px;">
            <option value="plus">Начислить НДС (20%)</option>
            <option value="minus">Выделить НДС (20%)</option>
        </select>
        <div class="result-box">
            <p>Сумма НДС: <span id="vat-price" class="res-val">0</span> ₽</p>
            <p>Итого: <span id="total-price" class="res-val">0</span> ₽</p>
        </div>
        <br>
        <a href="index.html" style="color: #666; text-decoration: none;">← На главную</a>
    </div>

    <script>
        function calcVat() {
            let val = parseFloat(document.getElementById('amount').value) || 0;
            let type = document.getElementById('type').value;
            let vat, total;
            if (type === 'plus') {
                vat = val * 0.20;
                total = val + vat;
            } else {
                vat = val - (val / 1.20);
                total = val;
                val = val - vat;
            }
            document.getElementById('vat-price').innerText = vat.toFixed(2);
            document.getElementById('total-price').innerText = total.toFixed(2);
        }
    </script>
</body>
</html>
