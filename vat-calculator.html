<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расчет НДС 20% онлайн</title>
    <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vat-card">
        <h3>Расчет НДС</h3>
        <input type="number" id="amount" placeholder="Введите сумму" style="width:100%; font-size: 20px; padding: 10px;" oninput="calcVat()">
        
        <div class="btn-group">
            <button id="addBtn" class="active" onclick="setMode('add')">Начислить 20%</button>
            <button id="subBtn" onclick="setMode('sub')">Выделить 20%</button>
        </div>

        <div class="result-area">
            <p>НДС (20%): <span id="vat-sum" class="big-sum">0</span> ₽</p>
            <p id="total-label">Итого с НДС:</p>
            <span id="total-sum" class="big-sum" style="color: #2563eb;">0</span> ₽
        </div>
        <a href="index.html" style="display:block; text-align:center; margin-top:20px; color:#aaa; text-decoration:none;">Назад</a>
    </div>

    <script>
        let mode = 'add';
        function setMode(m) {
            mode = m;
            document.getElementById('addBtn').classList.toggle('active', m === 'add');
            document.getElementById('subBtn').classList.toggle('active', m === 'sub');
            document.getElementById('total-label').innerText = m === 'add' ? 'Итого с НДС:' : 'Сумма без НДС:';
            calcVat();
        }
        function calcVat() {
            let val = parseFloat(document.getElementById('amount').value) || 0;
            let vat, res;
            if (mode === 'add') {
                vat = val * 0.2;
                res = val + vat;
            } else {
                vat = val - (val / 1.2);
                res = val - vat;
            }
            document.getElementById('vat-sum').innerText = vat.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('total-sum').innerText = res.toLocaleString(undefined, {minimumFractionDigits:2});
        }
    </script>
</body>
</html>
