<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конвертер валют СНГ — Тенге, Рубль, Доллар</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .converter-card {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .currency-item {
            display: flex;
            align-items: center;
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
        }
        .currency-item label {
            flex: 1;
            font-weight: bold;
            font-size: 14px;
        }
        .currency-item input {
            width: 150px;
            border: none;
            background: transparent;
            font-size: 18px;
            font-weight: bold;
            text-align: right;
            outline: none;
            color: #3a7bd5;
        }
        .info-text {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<header>
    <h1>💱 Конвертер валют</h1>
    <p>Мгновенный перевод между KZT, RUB и USD</p>
</header>

<div class="container">
    <div class="converter-card">
        <div class="currency-item">
            <label>🇰🇿 Тенге (KZT)</label>
            <input type="number" id="kzt" value="1000" oninput="convert('kzt')">
        </div>

        <div class="currency-item">
            <label>🇷🇺 Рубль (RUB)</label>
            <input type="number" id="rub" oninput="convert('rub')">
        </div>

        <div class="currency-item">
            <label>🇺🇸 Доллар (USD)</label>
            <input type="number" id="usd" oninput="convert('usd')">
        </div>

        <div class="info-text">
            <p>Введите сумму в любое поле для пересчета.<br>
            Примерный курс: 1$ ≈ 450₸ | 1$ ≈ 92₽ | 1₽ ≈ 4.9₸</p>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: #3a7bd5; text-decoration: none; font-size: 14px;">← Вернуться на главную</a>
        </div>
    </div>
</div>

<script>
    // Актуальные курсы (база — Тенге)
    const rates = {
        usd: 450, // 1 доллар = 450 тенге
        rub: 4.9  // 1 рубль = 4.9 тенге
    };

    function convert(source) {
        const kztInput = document.getElementById('kzt');
        const rubInput = document.getElementById('rub');
        const usdInput = document.getElementById('usd');

        let val = parseFloat(document.getElementById(source).value);

        if (isNaN(val)) {
            if (source !== 'kzt') kztInput.value = '';
            if (source !== 'rub') rubInput.value = '';
            if (source !== 'usd') usdInput.value = '';
            return;
        }

        let amountInKzt;

        // Приводим всё к тенге
        if (source === 'kzt') amountInKzt = val;
        if (source === 'rub') amountInKzt = val * rates.rub;
        if (source === 'usd') amountInKzt = val * rates.usd;

        // Рассчитываем остальные поля
        if (source !== 'kzt') kztInput.value = (amountInKzt).toFixed(2);
        if (source !== 'rub') rubInput.value = (amountInKzt / rates.rub).toFixed(2);
        if (source !== 'usd') usdInput.value = (amountInKzt / rates.usd).toFixed(2);
    }

    // Запускаем расчет при загрузке страницы
    convert('kzt');
</script>

</body>
</html>
