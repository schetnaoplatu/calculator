<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конвертер валют онлайн</title>
    <link rel="stylesheet" href="style.css">
   <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="conv-card">
        <h3>Конвертер валют</h3>
        <div class="flex-row">
            <input type="number" id="fromVal" value="1" oninput="convert()">
            <select id="fromCurr" onchange="convert()">
                <option value="USD">USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="RUB" selected>RUB (₽)</option>
            </select>
        </div>
        <button class="swap-btn" onclick="swap()">⇅</button>
        <div class="flex-row">
            <input type="number" id="toVal" readonly>
            <select id="toCurr" onchange="convert()">
                <option value="USD" selected>USD ($)</option>
                <option value="EUR">EUR (€)</option>
                <option value="RUB">RUB (₽)</option>
            </select>
        </div>
        <p style="font-size:12px; color:#94a3b8">Курс: 1 USD ≈ 92 RUB | 1 EUR ≈ 100 RUB</p>
        <a href="index.html" style="display:block; margin-top:15px; color:#ccc; text-decoration:none">← Назад</a>
    </div>
    <script>
        const rates = { "USD": 1, "EUR": 0.92, "RUB": 92 }; // Базовая логика относительно USD
        function convert() {
            let from = document.getElementById('fromCurr').value;
            let to = document.getElementById('toCurr').value;
            let val = parseFloat(document.getElementById('fromVal').value) || 0;
            // Пересчет через кросс-курс
            let result = val * (rates[to] / rates[from]);
            document.getElementById('toVal').value = result.toFixed(2);
        }
        function swap() {
            let f = document.getElementById('fromCurr').value;
            document.getElementById('fromCurr').value = document.getElementById('toCurr').value;
            document.getElementById('toCurr').value = f;
            convert();
        }
        convert();
    </script>
</body>
</html>
