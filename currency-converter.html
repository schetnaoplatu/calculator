<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конвертер валют: Тенге, Рубль, Доллар</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>💱 Конвертер валют СНГ</h2>
        
        <div class="input-group">
            <label>Сумма</label>
            <input type="number" id="fromAmount" value="1000" oninput="convert()">
            <select id="fromCurrency" onchange="convert()">
                <option value="KZT">🇰🇿 Тенге (₸)</option>
                <option value="RUB">🇷🇺 Рубль (₽)</option>
                <option value="USD" selected>🇺🇸 Доллар ($)</option>
            </select>
        </div>

        <div style="text-align: center; margin: 15px 0; font-size: 24px;">⬇️</div>

        <div class="res-box">
            <div id="results-list" style="text-align: left; line-height: 2;">
                </div>
        </div>

        <p style="font-size: 12px; color: var(--text-muted); margin-top: 15px;">
            Курс для расчета: <br>
            1 $ ≈ 450 ₸ | 1 $ ≈ 92 ₽ | 1 ₽ ≈ 4.9 ₸
        </p>

        <a href="index.html" class="back-link">← На главную</a>
    </div>

    <script>
        // Фиксированные курсы (можно обновлять раз в неделю)
        const rates = {
            "KZT": 1,
            "RUB": 4.9,   // 1 рубль = 4.9 тенге
            "USD": 450    // 1 доллар = 450 тенге
        };

        function convert() {
            const amount = parseFloat(document.getElementById('fromAmount').value) || 0;
            const from = document.getElementById('fromCurrency').value;
            
            // Переводим всё в тенге (базовая валюта)
            const amountInKZT = amount * rates[from];

            const resKZT = (amountInKZT / rates["KZT"]).toFixed(2);
            const resRUB = (amountInKZT / rates["RUB"]).toFixed(2);
            const resUSD = (amountInKZT / rates["USD"]).toFixed(2);

            document.getElementById('results-list').innerHTML = `
                <div>🇰🇿 <b>${resKZT}</b> Тенге</div>
                <div>🇷🇺 <b>${resRUB}</b> Рублей</div>
                <div>🇺🇸 <b>${resUSD}</b> Долларов</div>
            `;
        }
        
        // Запуск при загрузке
        convert();
    </script>
</body>
</html>
