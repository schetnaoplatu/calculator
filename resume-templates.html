<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор резюме — Создать бесплатно</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="editor">
        <h3>Личные данные</h3>
        <input type="text" id="inName" placeholder="ФИО" oninput="updateCV()">
        <input type="text" id="inJob" placeholder="Желаемая должность" oninput="updateCV()">
        <input type="text" id="inContact" placeholder="Телефон, Email, Город" oninput="updateCV()">
        
        <h3>О себе</h3>
        <textarea id="inAbout" rows="4" placeholder="Кратко о ваших достижениях..." oninput="updateCV()"></textarea>
        
        <h3>Опыт работы</h3>
        <textarea id="inExp" rows="6" placeholder="Период — Компания — Обязанности" oninput="updateCV()"></textarea>
        
        <h3>Образование</h3>
        <textarea id="inEdu" rows="4" placeholder="ВУЗ, специальность, год" oninput="updateCV()"></textarea>

        <button class="btn-print" onclick="window.print()">Распечатать / Сохранить PDF</button>
        <a href="index.html" class="back-link" style="display:block; text-align:center; margin-top:20px; color:#aaa; text-decoration:none">← На главную</a>
    </div>

    <div class="preview" id="cv-print-area">
        <div class="cv-header">
            <div id="outName" class="cv-name">Иван Иванов</div>
            <div id="outJob" class="cv-title">Ваша должность</div>
            <div id="outContact" style="margin-top:10px; font-size:12px; color:#666;">+7 (999) 000-00-00 | email@example.com</div>
        </div>

        <div class="cv-section">
            <div class="cv-section-title">О себе</div>
            <div id="outAbout" class="cv-text">Расскажите о своих сильных сторонах...</div>
        </div>

        <div class="cv-section">
            <div class="cv-section-title">Опыт работы</div>
            <div id="outExp" class="cv-text">Здесь будет ваш список прошлых мест работы...</div>
        </div>

        <div class="cv-section">
            <div class="cv-section-title">Образование</div>
            <div id="outEdu" class="cv-text">Данные об учебных заведениях...</div>
        </div>
    </div>
</div>

<script>
    function updateCV() {
        const fields = [
            ['inName', 'outName'],
            ['inJob', 'outJob'],
            ['inContact', 'outContact'],
            ['inAbout', 'outAbout'],
            ['inExp', 'outExp'],
            ['inEdu', 'outEdu']
        ];
        
        fields.forEach(pair => {
            const val = document.getElementById(pair[0]).value;
            if(val) {
                document.getElementById(pair[1]).innerText = val;
            }
        });
    }
</script>

</body>
</html>
